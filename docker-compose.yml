version: "3.9"

services:
  mmb-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mikumikubeam
    ports:
      - "3000:3000"
    environment:
      SERVER_PORT: "3000"
      # Set to your production domain or * to allow all origins
      ALLOWED_ORIGIN: "*"
      # Set to "true" to run attacks without proxies configured
      ALLOW_NO_PROXY: "false"
      # Use "json" for structured logs (recommended in production)
      LOG_FORMAT: "json"
    volumes:
      # Mount this directory to persist proxy/UA lists across container restarts.
      # On first run with an empty volume, default files from the image will be used.
      - mmb_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/attacks"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mmb_data:
    driver: local
